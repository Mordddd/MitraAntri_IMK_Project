name: mitra_antri_mockup
version: 1.0.0+1
publish_to: 'none'
description: High fidelity Flutter mockup for Mitra Antri app.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/categories/
    - assets/images/events/